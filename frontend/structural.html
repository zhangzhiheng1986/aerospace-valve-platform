<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结构强度分析 - 航空航天电磁阀研发平台</title>
    <link rel="stylesheet" href="/frontend/shared/bundle.css">
<link rel="stylesheet" href="/frontend/shared/compat.css">
<style>
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .header h1 { color: #00d4ff; }
        .back-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 5px;
            text-decoration: none;
        }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
        }
        .panel h2 { color: #00d4ff; margin-bottom: 15px; font-size: 18px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: white;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: #888; }
        .result-value { color: #00d4ff; font-weight: bold; }
        .safe { color: #00c853; }
        .warning { color: #ffc107; }
        .danger { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 结构强度分析</h1>
            <a href="/" class="back-btn">← 返回主页</a>
        </div>
        
        <div class="content">
            <div class="panel">
                <h2>输入参数</h2>
                
                <div class="form-group">
                    <label>材料</label>
                    <select id="material">
                        <option value="steel_304">不锈钢 304</option>
                        <option value="steel_316">不锈钢 316</option>
                        <option value="titanium_tc4">钛合金 TC4</option>
                        <option value="inconel_718">Inconel 718</option>
                        <option value="aluminum_7075">铝合金 7075-T6</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>外径 (mm)</label>
                    <input type="number" id="diameter" value="20" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>壁厚 (mm)</label>
                    <input type="number" id="thickness" value="2" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>长度 (mm)</label>
                    <input type="number" id="length" value="50" step="1">
                </div>
                
                <div class="form-group">
                    <label>内压 (MPa)</label>
                    <input type="number" id="pressure" value="1" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>轴向力 (N)</label>
                    <input type="number" id="axialForce" value="1000" step="10">
                </div>
                
                <div class="form-group">
                    <label>弯矩 (N·m)</label>
                    <input type="number" id="bendingMoment" value="5" step="0.1">
                </div>
                
                <button class="btn" onclick="runAnalysis()">开始分析</button>
            </div>
            
            <div class="panel">
                <h2>分析结果</h2>
                <div id="results">
                    <p style="color: #888; text-align: center; padding: 40px;">
                        请输入参数并点击"开始分析"
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function runAnalysis() {
            const data = {
                material: document.getElementById('material').value,
                geometry: {
                    diameter: parseFloat(document.getElementById('diameter').value) / 1000,
                    thickness: parseFloat(document.getElementById('thickness').value) / 1000,
                    length: parseFloat(document.getElementById('length').value) / 1000
                },
                loads: {
                    pressure: parseFloat(document.getElementById('pressure').value) * 1e6,
                    force_x: parseFloat(document.getElementById('axialForce').value),
                    moment_y: parseFloat(document.getElementById('bendingMoment').value)
                }
            };
            
            document.getElementById('results').innerHTML = '<p style="text-align:center;color:#888;">分析中...</p>';
            
            try {
                const response = await fetch('/api/structural/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    displayResults(result);
                } else {
                    document.getElementById('results').innerHTML = `<p style="color:#ff4d4d;">错误: ${result.error}</p>`;
                }
            } catch (error) {
                document.getElementById('results').innerHTML = `<p style="color:#ff4d4d;">请求失败: ${error.message}</p>`;
            }
        }
        
        function displayResults(result) {
            const sf = result.safety_factor;
            const stress = result.stress_analysis;
            const geom = result.geometry;
            const mat = result.material;
            
            const safetyClass = sf.safety_factor >= 3 ? 'safe' : (sf.safety_factor >= 1.5 ? 'warning' : 'danger');
            
            document.getElementById('results').innerHTML = `
                <div class="result-box">
                    <h3 style="color:#00d4ff;margin-bottom:10px;">安全评估</h3>
                    <div class="result-item">
                        <span class="result-label">安全系数</span>
                        <span class="result-value ${safetyClass}">${sf.safety_factor.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">评估结果</span>
                        <span class="result-value ${safetyClass}">${sf.assessment}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">最大应力</span>
                        <span class="result-value">${stress.max_stress_MPa.toFixed(2)} MPa</span>
                    </div>
                </div>
                
                <div class="result-box">
                    <h3 style="color:#00d4ff;margin-bottom:10px;">应力分析</h3>
                    ${stress.pressure_stress ? `
                    <div class="result-item">
                        <span class="result-label">环向应力</span>
                        <span class="result-value">${stress.pressure_stress.hoop_stress_MPa.toFixed(2)} MPa</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">轴向应力</span>
                        <span class="result-value">${stress.pressure_stress.axial_stress_MPa.toFixed(2)} MPa</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Von Mises应力</span>
                        <span class="result-value">${stress.pressure_stress.von_mises_MPa.toFixed(2)} MPa</span>
                    </div>
                    ` : ''}
                </div>
                
                <div class="result-box">
                    <h3 style="color:#00d4ff;margin-bottom:10px;">变形与振动</h3>
                    <div class="result-item">
                        <span class="result-label">变形量</span>
                        <span class="result-value">${(result.deformation.deformation_m * 1000).toFixed(4)} mm</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">一阶固有频率</span>
                        <span class="result-value">${result.natural_frequency.natural_frequency_Hz.toFixed(1)} Hz</span>
                    </div>
                </div>
                
                <div class="result-box">
                    <h3 style="color:#00d4ff;margin-bottom:10px;">材料属性</h3>
                    <div class="result-item">
                        <span class="result-label">材料名称</span>
                        <span class="result-value">${mat.name}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">屈服强度</span>
                        <span class="result-value">${mat.yield_strength_MPa.toFixed(0)} MPa</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">弹性模量</span>
                        <span class="result-value">${mat.elastic_modulus_GPa.toFixed(0)} GPa</span>
                    </div>
                </div>
            `;
        }
    </script>
<script src="/frontend/shared/utils.js"></script>
<script src="/frontend/shared/toast.js"></script>
<script src="/frontend/shared/api.js"></script>
</body>
</html>
