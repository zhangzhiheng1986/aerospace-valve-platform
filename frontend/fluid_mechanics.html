<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fluid Mechanics Super Calculator</title>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>




/* ===== SIDEBAR OVERLAY (mobile) ===== */
.sidebar-backdrop {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:90; opacity:0; transition:opacity 0.25s;
}
.sidebar-backdrop.open { opacity:1; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--bg-secondary); border-right:1px solid var(--border);
  overflow-y:auto; display:flex; flex-direction:column; z-index:100;
}
.sidebar-header { padding:18px 16px; border-bottom:1px solid var(--border); }
.sidebar-header h2 { font-size:15px; color:var(--accent); display:flex; align-items:center; gap:8px; }
.sidebar-header .sub { font-size:11px; color:var(--text-secondary); margin-top:6px; }
.lang-switch {
  margin-top:10px; display:flex; gap:4px; background:var(--bg-primary);
  border-radius:20px; padding:3px; border:1px solid var(--border);
}
.lang-btn {
  flex:1; padding:6px 0; border:none; border-radius:16px;
  font-size:12px; cursor:pointer; background:none; color:var(--text-secondary);
  transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.lang-btn.active { background:var(--accent); color:var(--bg-primary); font-weight:600; }
.unit-switch {
  margin-top:8px; display:flex; gap:4px; background:var(--bg-primary);
  border-radius:20px; padding:3px; border:1px solid var(--border);
}
.unit-btn {
  flex:1; padding:4px 0; border:none; border-radius:16px;
  font-size:11px; cursor:pointer; background:none; color:var(--text-secondary);
  transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.unit-btn.active { background:var(--accent2); color:var(--bg-primary); font-weight:600; }
.sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
.cat-item {
  padding:13px 16px; cursor:pointer; display:flex; align-items:center; gap:10px;
  font-size:14px; color:var(--text-secondary); transition:all 0.15s;
  border-left:3px solid transparent; -webkit-tap-highlight-color:transparent;
}
.cat-item:hover { background:var(--bg-card); color:var(--text-primary); }
.cat-item.active { background:var(--accent-glow); color:var(--accent); border-left-color:var(--accent); }
.cat-item .icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
.cat-item .count { margin-left:auto; font-size:11px; background:var(--bg-primary); padding:2px 8px; border-radius:10px; }
.sidebar-footer { padding:14px 16px; border-top:1px solid var(--border); }

/* ===== SEARCH ===== */
.search-container { position:relative; flex:1; min-width:200px; max-width:500px; }
.search-input {
  width:100%; padding:8px 36px 8px 14px; border-radius:20px;
  border:1px solid var(--border); background:var(--bg-primary);
  color:var(--text-primary); font-size:13px; outline:none;
  transition:border-color 0.2s;
}
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--text-muted); }
.search-icon, .search-clear {
  position:absolute; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--text-muted); cursor:pointer;
  font-size:14px; padding:4px;
}
.search-icon { right:8px; pointer-events:none; }
.search-clear { right:28px; display:none; }
.search-clear.visible { display:block; }
.search-dropdown {
  position:absolute; top:calc(100% + 6px); left:0; right:0;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); max-height:360px; overflow-y:auto;
  z-index:200; display:none; box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.search-dropdown.open { display:block; }
.search-result-item {
  padding:10px 14px; cursor:pointer; border-bottom:1px solid rgba(42,58,74,0.4);
  font-size:13px; transition:background 0.15s;
  display:flex; justify-content:space-between; align-items:center;
}
.search-result-item:hover, .search-result-item.active { background:var(--accent-glow); }
.search-result-item .sr-name { color:var(--text-primary); font-weight:500; }
.search-result-item .sr-cat { font-size:11px; color:var(--text-muted); }
.search-no-results {
  padding:20px; text-align:center; color:var(--text-muted); font-size:13px;
}
.search-backdrop { display:none; position:fixed; inset:0; z-index:199; }
.search-backdrop.open { display:block; }

/* ===== MAIN LAYOUT ===== */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.toolbar {
  padding:12px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; background:rgba(15,25,35,0.95);
  flex-shrink:0; flex-wrap:wrap;
}
.toolbar h1 { font-size:18px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.toolbar .breadcrumb { font-size:12px; color:var(--text-muted); white-space:nowrap; }
.back-link { font-size:12px; color:var(--text-secondary); margin-left:auto; text-decoration:none; white-space:nowrap; }
.back-link:hover { color:var(--accent); }

/* Hamburger */
.hamburger { display:none; background:none; border:none; color:var(--accent); font-size:22px; cursor:pointer; padding:4px 6px; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.formula-back-btn { display:none; background:var(--accent-glow); border:1px solid rgba(0,180,216,0.3); color:var(--accent); padding:8px 14px; border-radius:20px; font-size:12px; cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.formula-back-btn:active { background:var(--accent); color:var(--bg-primary); }

.content { flex:1; display:flex; overflow:hidden; min-height:0; }

/* ===== FORMULA LIST ===== */
.formula-list {
  width:var(--formula-list-w); min-width:var(--formula-list-w);
  border-right:1px solid var(--border); overflow-y:auto;
  background:var(--bg-secondary); -webkit-overflow-scrolling:touch;
}
.formula-item {
  padding:12px 14px; cursor:pointer; border-bottom:1px solid rgba(42,58,74,0.5);
  font-size:13px; color:var(--text-secondary); transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.formula-item:hover { background:var(--bg-card); }
.formula-item.selected { background:var(--accent-glow); color:var(--accent); border-left:3px solid var(--accent); }
.formula-item:active { background:var(--bg-card); }
.formula-item .f-name { font-weight:500; }
.formula-item .f-preview { font-size:11px; color:var(--text-muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ===== CALCULATOR ===== */
.calculator { flex:1; overflow-y:auto; padding:24px; -webkit-overflow-scrolling:touch; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state .icon { font-size:52px; margin-bottom:16px; }
.empty-state h3 { font-size:17px; margin-bottom:10px; color:var(--text-secondary); }
.empty-state p { font-size:14px; line-height:1.7; }

/* FORMULA HEADER */
.formula-header { margin-bottom:20px; }
.formula-header h2 { font-size:22px; color:var(--accent); margin-bottom:8px; }
.formula-header .formula-display {
  background:var(--bg-primary); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px 24px; margin:12px 0;
  overflow-x:auto; min-height:55px; display:flex; align-items:center;
  justify-content:center; -webkit-overflow-scrolling:touch;
}
.formula-header .formula-desc { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.formula-header .application { font-size:13px; color:var(--accent); margin-top:8px; padding:10px 14px; background:var(--accent-glow); border-radius:var(--radius-sm); border-left:3px solid var(--accent); line-height:1.5; }

/* CALC BODY - 2 columns on desktop, stacks on mobile */
.calc-body { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* INPUT PANEL */
.input-panel {
  background:var(--bg-card); border-radius:var(--radius);
  padding:20px; border:1px solid var(--border);
}
.input-panel h3 { font-size:15px; margin-bottom:16px; color:var(--accent); display:flex; align-items:center; gap:8px; }
.input-group { margin-bottom:14px; }
.input-group label {
  display:flex; justify-content:space-between; align-items:baseline;
  font-size:12px; color:var(--text-secondary); margin-bottom:5px;
  text-transform:uppercase; letter-spacing:0.3px; flex-wrap:wrap; gap:4px;
}
.input-group label .unit { font-size:11px; color:var(--text-muted); text-transform:none; font-weight:normal; }
.input-group input {
  width:100%; padding:11px 14px; background:var(--bg-primary);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text-primary); font-size:14px; font-family:'Consolas','Menlo','SF Mono',monospace;
  transition:border-color 0.15s; -webkit-appearance:none;
}
.input-group input:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(0,180,216,0.15); }
.input-group input.invalid { border-color:var(--danger); }
.input-hint { font-size:11px; color:var(--text-muted); margin-top:3px; line-height:1.4; }
.btn-row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.btn {
  padding:11px 22px; border:none; border-radius:var(--radius-sm);
  font-size:14px; cursor:pointer; transition:all 0.2s; font-weight:500;
  -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--accent); color:var(--bg-primary); }
.btn-primary:hover { background:var(--accent2); box-shadow:0 0 16px var(--accent-glow); }
.btn-secondary { background:var(--border); color:var(--text-secondary); }
.btn-secondary:hover { background:#3a4a5a; color:var(--text-primary); }
.btn-outline { background:none; border:1px solid var(--border); color:var(--text-secondary); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }

/* RESULTS */
.results-panel {
  background:var(--bg-card); border-radius:var(--radius);
  padding:20px; border:1px solid var(--border); min-height:200px;
}
.results-panel h3 { font-size:15px; margin-bottom:16px; color:var(--accent); }
.result-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 0; border-bottom:1px solid rgba(42,58,74,0.4);
}
.result-item:last-child { border-bottom:none; }
.result-label { font-size:14px; color:var(--text-secondary); }
.result-value-group { text-align:right; }
.result-value { font-size:24px; font-weight:700; color:var(--accent); font-family:'Consolas','SF Mono',monospace; }
.result-unit { font-size:12px; color:var(--text-muted); margin-left:4px; }
.result-derived { margin-top:14px; padding-top:14px; border-top:1px dashed var(--border); }
.result-derived .title { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.error-box { color:var(--danger); font-size:14px; padding:14px; background:rgba(255,107,107,0.08); border-radius:var(--radius-sm); border:1px solid rgba(255,107,107,0.2); line-height:1.5; }

/* VARIABLE GLOSSARY */
.glossary {
  margin-top:20px; background:var(--bg-card); border-radius:var(--radius);
  padding:20px; border:1px solid var(--border);
}
.glossary h3 { font-size:15px; color:var(--accent); margin-bottom:14px; cursor:pointer; display:flex; align-items:center; gap:8px; user-select:none; }
.glossary h3 .arrow { transition:transform 0.2s; font-size:11px; }
.glossary h3.collapsed .arrow { transform:rotate(-90deg); }
.glossary-body { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
.glossary-body.collapsed { display:none; }
.glossary-item { padding:10px 12px; background:var(--bg-primary); border-radius:var(--radius-sm); border:1px solid rgba(42,58,74,0.3); }
.glossary-item .symbol { font-family:'Times New Roman',serif; font-style:italic; color:var(--accent); font-size:16px; display:inline-block; min-width:32px; }
.glossary-item .meaning { font-size:12px; color:var(--text-secondary); display:inline; }
.glossary-item .unit-i { font-size:11px; color:var(--text-muted); margin-left:4px; }

/* HOME */
.home-view { display:flex; flex-wrap:wrap; gap:14px; padding:20px; overflow-y:auto; align-content:flex-start; }
.home-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; width:220px; cursor:pointer; transition:all 0.2s;
  -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
.home-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.home-card:active { transform:scale(0.97); background:var(--accent-glow); }
.home-card h3 { font-size:15px; color:var(--accent); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.home-card .desc { font-size:12px; color:var(--text-secondary); line-height:1.6; }
.home-card .count-badge { display:inline-block; margin-top:12px; font-size:11px; background:var(--accent-glow); color:var(--accent); padding:4px 12px; border-radius:12px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#3a4a5a; }

/* MathJax */
.MathJax { font-size:1.15em !important; color:var(--text-primary) !important; }

/* ====================================================================== */
/*                        RESPONSIVE  -  TABLET                           */
/* ====================================================================== */
@media (max-width:1200px) {
  .calc-body { grid-template-columns:1fr; }
  .formula-list { width:250px; min-width:250px; }
  .glossary-body { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); }
}

/* ====================================================================== */
/*                        RESPONSIVE  -  MOBILE                           */
/* ====================================================================== */
@media (max-width:768px) {

  /* -- Root adjustments -- */
  :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }

  /* -- Hide desktop elements -- */
  .toolbar .back-link { display:none; }
  .sidebar-footer { display:none; }

  /* -- Show hamburger + back -- */
  .hamburger { display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:8px; }
  .hamburger:active { background:var(--accent-glow); }
  .formula-back-btn { display:none; }
  .formula-back-btn.visible { display:inline-flex; align-items:center; }

  /* -- Toolbar compact -- */
  .toolbar { padding:10px 14px; gap:8px; }
  .toolbar h1 { font-size:15px; }
  .toolbar .breadcrumb { font-size:11px; max-width:120px; overflow:hidden; text-overflow:ellipsis; }

  /* -- Sidebar → slide overlay -- */
  .sidebar {
    position:fixed; top:0; left:0; bottom:0; width:calc(var(--sidebar-w) + 10px);
    transform:translateX(-100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform:translateX(0); }

  /* -- Backdrop -- */
  .sidebar-backdrop { display:block; pointer-events:none; }
  .sidebar-backdrop.open { pointer-events:auto; }

  /* -- Formula list → full width sheet -- */
  .formula-list {
    position:absolute; top:0; left:0; right:0; bottom:0; width:100%; min-width:100%;
    border-right:none; z-index:5; background:var(--bg-secondary);
    transform:none; opacity:1; transition:transform 0.25s ease;
  }
  .formula-list.hidden { transform:translateX(-100%); pointer-events:none; opacity:0; }

  /* -- Cat view → relative (sheet + calc) -- */
  #cat-view { position:relative; flex-direction:column; }
  #cat-view .calculator {
    position:absolute; inset:0; width:100%; z-index:10;
    background:var(--bg-primary); transition:transform 0.25s ease;
    padding:16px 12px 40px;
  }
  #cat-view .calculator.shifted { transform:translateX(100%); }

  /* -- Calc-body always single column -- */
  .calc-body { grid-template-columns:1fr; gap:14px; }

  /* -- Larger touch targets -- */
  .cat-item { padding:16px 16px; font-size:15px; }
  .formula-item { padding:14px 16px; font-size:14px; }
  .formula-item .f-name { font-size:14px; }
  .formula-item .f-preview { font-size:12px; }
  .btn { padding:14px 24px; font-size:15px; min-height:48px; }
  .btn-row { gap:8px; }
  .btn-row .btn { flex:1; text-align:center; justify-content:center; display:flex; align-items:center; }

  /* -- Input fields bigger -- */
  .input-group input { padding:14px 16px; font-size:16px; }
  .input-group label { font-size:13px; }
  .input-panel { padding:16px 14px; }
  .results-panel { padding:16px 14px; }

  /* -- Formula header compact -- */
  .formula-header h2 { font-size:19px; }
  .formula-header .formula-display { padding:14px 14px; overflow-x:auto; }
  .formula-desc { font-size:14px; }

  /* -- Results -- */
  .result-value { font-size:22px; }

  /* -- Glossary 1-col -- */
  .glossary { padding:14px 12px; }
  .glossary-body { grid-template-columns:1fr; gap:8px; }
  .glossary-item .symbol { min-width:40px; font-size:15px; }
  .glossary-item .meaning { font-size:13px; }
  .glossary h3 { font-size:15px; padding:6px 0; }

  /* -- Home cards 1-col -- */
  .home-view { padding:12px; gap:10px; }
  .home-card { width:100%; padding:18px; }
  .home-card h3 { font-size:15px; }

  /* -- Empty state padding -- */
  .empty-state { padding:40px 16px; }
  .empty-state .icon { font-size:44px; }

  /* -- Safe area bottom padding -- */
  .calculator { padding-bottom:calc(24px + var(--safe-bottom)); }
  .glossary { margin-bottom:var(--safe-bottom); }

  /* -- Sidebar header bigger -- */
  .sidebar-header { padding:20px 16px; }
  .sidebar-header h2 { font-size:16px; }
  .lang-btn { padding:7px 0; font-size:13px; }
}
</style>

<body>

<!-- HAMBURGER (mobile only) -->
<button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">&#x2630;</button>

<!-- SIDEBAR BACKDROP -->
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">

    <div class="lang-switch">
      <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">&#x4E2D;&#x6587;</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

      <button class="unit-btn active" data-unit="SI" onclick="setUnitSystem('SI')">SI</button>

      <button class="unit-btn" data-unit="US" onclick="setUnitSystem('US')">US</button>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="/" class="back-link">&larr; <span data-i18n="back">Back to Platform</span></a>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="toolbar" id="toolbar">
    <button class="formula-back-btn" id="formula-back-btn" onclick="goBackToFormulaList()">
      &larr; <span data-i18n="back_formulas">Back</span>
    </button>
    <h1 id="page-title">Fluid Mechanics Super Calculator</h1>
    <span class="breadcrumb" id="breadcrumb"></span>

      <input type="text" class="search-input" id="search-input"
        placeholder="Search 135 formulas..." autocomplete="off">

      <span class="search-icon">&#128269;</span>
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>

  <div class="content" id="home-view">

        <p data-i18n="select_formula_hint">Choose a formula from the left panel to begin calculation.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let catalog = {};
let i18n = { formulas:{}, categories:{}, fluids:{}, pipe_roughness:{} };
let lang = 'zh';
let currentCat = null;
let currentFormulaId = null;
let sidebarOpen = false;
let lastCatBeforeSelect = null;


// ===== SIDEBAR TOGGLE (mobile) =====
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  updateSidebarState();
}
function closeSidebar() {
  sidebarOpen = false;
  updateSidebarState();
}
function updateSidebarState() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (sidebarOpen) { sb.classList.add('open'); bd.classList.add('open'); }
  else { sb.classList.remove('open'); bd.classList.remove('open'); }
}
// Close sidebar when category selected (mobile only)
function onMobileCatClick(catKey) {
  closeSidebar();
  selectCategory(catKey);
}

  const sel = document.querySelector('.formula-item[data-fid="'+fid+'"]');

// ===== RENDER CALCULATOR =====
function renderCalculator(formula, defaults) {
  const fid = formula.id;
  const fi = i18n.formulas[fid];

  const fName = lang==='zh' && fi ? fi.name_zh : formula.name;
  const fDesc = lang==='zh' && fi ? fi.desc_zh : '';
  const fLatex = fi ? fi.latex : formula.eq;
  const fApp = lang==='zh' && fi ? fi.application_zh : '';

  const inputFields = formula.inputs.map(key => {
    const pinfo = fi && fi.inputs ? fi.inputs[key] : null;
    const labelZh = pinfo ? pinfo.label_zh : '';
    const paramName = key;
    const label = lang==='zh' && labelZh
      ? `${labelZh} <code style="font-size:${window.innerWidth<=768?'11px':'10px'};color:var(--text-muted);background:var(--bg-secondary);padding:1px 6px;border-radius:3px;margin-left:4px;font-family:'Consolas','Menlo',monospace;">${paramName}</code>`
      : paramName;
    const unit = pinfo ? pinfo.unit : '';
    const currentUnit = getUnitForParam(key);
    const displayUnit = currentUnit ? currentUnit.label : unit;
    const hint = lang==='zh' && pinfo ? pinfo.desc_zh : '';
    const val = defaults[key] !== undefined ? defaults[key] : '';
    const placeholderText = lang==='zh' && labelZh
      ? `${labelZh} (${key})`
      : key;
    return `<div class="input-group">
      <label>${label}${displayUnit ? ' <span class="unit">['+displayUnit+']</span>' : ''}</label>
      <input type="number" step="any" id="inp_${key}" value="${val}" placeholder="${placeholderText}">
      ${hint ? '<div class="input-hint">'+hint+'</div>' : ''}
    </div>`;
  }).join('');

  const outKey = formula.output;
  const oinfo = fi && fi.output ? fi.output[outKey] : null;
  const outLabel = lang==='zh' && oinfo ? oinfo.label_zh : outKey;
  const outUnit = oinfo ? oinfo.unit : '';

  const allGlossary = formula.inputs.map(key => {
    const pinfo = fi && fi.inputs ? fi.inputs[key] : null;
    return `<div class="glossary-item">
      <span class="symbol">${key}</span>
      <span class="meaning">${lang==='zh' && pinfo ? pinfo.label_zh : key}</span>
      ${pinfo && pinfo.unit ? '<span class="unit-i">['+pinfo.unit+']</span>' : ''}
    </div>`;
  }).concat([`<div class="glossary-item" style="border-color:rgba(0,180,216,0.35);">
    <span class="symbol" style="color:var(--success);">${outKey}</span>
    <span class="meaning" style="color:var(--success);">${outLabel}</span>
    ${outUnit ? '<span class="unit-i">['+outUnit+']</span>' : ''}
  </div>`]).join('');

  // MathJax formula element ID
  const mjxElId = 'mjx-formula-' + fid.replace(/[^a-zA-Z0-9]/g,'_');

  document.getElementById('calculator').innerHTML = `
    <div class="formula-header">
      <h2>${fName}</h2>
      ${fDesc ? '<div class="formula-desc">'+fDesc+'</div>' : ''}
      <div class="formula-display" id="${mjxElId}">\\[${fLatex}\\]</div>
      ${fApp ? '<div class="application"><strong>'+getI18n('application')+':</strong> '+fApp+'</div>' : ''}
    </div>
    <div class="calc-body">
      <div class="input-panel">
        <h3>\ud83d\udcd0 ${getI18n('input_params')}</h3>
        ${inputFields}
        <div class="btn-row">
          <button class="btn btn-primary" onclick="compute()">\u2699 ${getI18n('calculate')}</button>
          <button class="btn btn-outline" onclick="loadDefaults()">${getI18n('default_values')}</button>
          <button class="btn btn-secondary" onclick="resetInputs()">${getI18n('reset')}</button>
        </div>
      </div>
      <div class="results-panel" id="results-panel">
        <h3>\ud83d\udcca ${getI18n('results')}</h3>
        <div id="results-content" class="empty-state" style="padding:30px 0;">
          <p>${getI18n('no_results')}</p>
        </div>
      </div>
    </div>
    <div class="glossary">
      <h3 onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">
        <span class="arrow">\u25BC</span> \ud83d\udcd6 ${getI18n('variable_glossary')}
      </h3>
      <div class="glossary-body">${allGlossary}</div>
    </div>`;

  // Render MathJax
  setTimeout(() => {
    const mjxEl = document.getElementById(mjxElId);
    if (window.MathJax && mjxEl) {
      MathJax.typesetClear([mjxEl]);
      MathJax.typesetPromise([mjxEl]).catch(()=>{});
    }
  }, 80);
}

// ===== COMPUTE =====
async function compute() {
  if (!currentFormulaId) return;
  const cat = catalog[currentCat];
  const formula = cat && cat.formulas ? cat.formulas.find(f=>f.id===currentFormulaId) : null;
  if (!formula) return;

  const inputs = {};
  let hasError = false;
  formula.inputs.forEach(key => {
    const el = document.getElementById('inp_'+key);
    if (el && el.value !== '') {
      const v = parseFloat(el.value);
      if (isNaN(v)) { el.classList.add('invalid'); hasError = true; }
      else { el.classList.remove('invalid'); inputs[key] = currentToSI(v, key); }
    } else {
      if (el) el.classList.add('invalid');
      hasError = true;
    }
  });
  if (hasError) return;

  const panel = document.getElementById('results-content');
  panel.innerHTML = '<div class="empty-state" style="padding:30px 0;"><p>'+getI18n('computing')+'</p></div>';

  try {
    const res = await fetch('/api/fluid_mechanics/compute', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({formula_id:currentFormulaId, inputs})
    });
    const data = await res.json();
    const fi = i18n.formulas[currentFormulaId];
    const outKey = formula.output;
    const oinfo = fi && fi.output ? fi.output[outKey] : null;
    const outLabel = lang==='zh' && oinfo ? oinfo.label_zh : outKey;
    const siOutUnit = oinfo ? oinfo.unit : '';
    const outCurrUnit = getUnitForParam(outKey);
    const displayOutUnit = outCurrUnit ? outCurrUnit.label : siOutUnit;

    if (data.error) {
      panel.innerHTML = '<div class="error-box">Error: '+data.error+'</div>';
    } else if (data.results && Object.keys(data.results).length > 0) {
      panel.innerHTML = Object.entries(data.results).map(([key, val]) => {
        const isPrimary = key === outKey;
        const displayValValue = val === null ? 'N/A' : (typeof val==='number' ? siToCurrent(val, key) : val);
        const displayVal = typeof displayValValue === 'number'
          ? (Math.abs(displayValValue)>=1e6||Math.abs(displayValValue)<1e-4 ? displayValValue.toExponential(4) : displayValValue.toPrecision(6))
          : displayValValue;
        const curUnit = getUnitForParam(key);
        const displayUnit = isPrimary ? displayOutUnit : (curUnit ? curUnit.label : '');
        return `<div class="result-item">
          <span class="result-label">${isPrimary ? outLabel : key}</span>
          <div class="result-value-group">
            <span class="result-value">${displayVal}</span>
            ${displayUnit ? '<span class="result-unit">'+displayUnit+'</span>' : ''}
          </div>
        </div>`;
      }).join('');
    } else {
      panel.innerHTML = '<div class="empty-state" style="padding:30px 0;"><p>'+getI18n('no_results')+'</p></div>';
    }
  } catch(e) {
    panel.innerHTML = '<div class="error-box">Network error: '+e.message+'</div>';
  }
}

function loadDefaults() {
  if (!currentFormulaId) return;
  fetch('/api/fluid_mechanics/defaults').then(r=>r.json()).then(all => {
    const cat = catalog[currentCat];
    const formula = cat && cat.formulas ? cat.formulas.find(f=>f.id===currentFormulaId) : null;
    if (!formula) return;
    const defs = all[currentFormulaId] || {};
    formula.inputs.forEach(key => {
      const el = document.getElementById('inp_'+key);
      if (el && defs[key] !== undefined) { el.value = defs[key]; el.classList.remove('invalid'); }
    });
  });
}

function resetInputs() {
  if (!currentFormulaId) return;
  const cat = catalog[currentCat];
  const formula = cat && cat.formulas ? cat.formulas.find(f=>f.id===currentFormulaId) : null;
  if (!formula) return;
  formula.inputs.forEach(key => {
    const el = document.getElementById('inp_'+key);
    if (el) { el.value = ''; el.classList.remove('invalid'); }
  });
}

// ===== SEARCH =====
let searchIndex = [];
let searchActiveIdx = -1;

function fetchSearchIndex() {
  fetch('/api/fluid_mechanics/search-index')
    .then(r => r.json())
    .then(data => { searchIndex = data; })
    .catch(() => {});
}

function fuzzyMatch(query, text) {
  const q = query.toLowerCase();
  const t = (text || '').toLowerCase();
  let qi = 0;
  for (let i = 0; i < t.length && qi < q.length; i++) {
    if (t[i] === q[qi]) qi++;
  }
  return qi === q.length;
}

function performSearch() {
  const q = document.getElementById('search-input').value.trim();
  const dropdown = document.getElementById('search-dropdown');
  const backdrop = document.getElementById('search-backdrop');
  const clearBtn = document.getElementById('search-clear');
  searchActiveIdx = -1;
  if (q.length < 2) { closeSearch(); return; }
  const results = [];
  for (const f of searchIndex) {
    if (fuzzyMatch(q, f.name_zh) || fuzzyMatch(q, f.name_en) || fuzzyMatch(q, f.keywords)) {
      results.push(f);
      if (results.length >= 20) break;
    }
  }
  if (results.length === 0) {
    dropdown.innerHTML = '<div class="search-no-results">No matching formulas found</div>';
  } else {
    dropdown.innerHTML = results.map((f, i) => {
      const catName = getCatName(f.category);
      return '<div class="search-result-item" data-fid="'+f.id+'" data-cat="'+f.category+'" data-idx="'+i+'"'
        + ' onmousedown="selectSearchResult(\''+f.id+'\',\''+f.category+'\')">'
        + '<span class="sr-name">'+f.name_zh+'</span>'
        + '<span class="sr-cat">'+catName+'</span></div>';
    }).join('');
  }
  dropdown.classList.add('open');
  backdrop.classList.add('open');
  clearBtn.classList.add('visible');
}

function selectSearchResult(fid, catKey) {
  closeSearch();
  document.getElementById('search-input').value = '';
  selectCategory(catKey);
  setTimeout(() => selectFormula(fid), 200);
}

function closeSearch() {
  document.getElementById('search-dropdown').classList.remove('open');
  document.getElementById('search-backdrop').classList.remove('open');
  document.getElementById('search-clear').classList.remove('visible');
  searchActiveIdx = -1;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  closeSearch();
}

// Search input handlers
document.addEventListener('DOMContentLoaded', () => {
  fetchSearchIndex();
  const inp = document.getElementById('search-input');
  inp.addEventListener('input', performSearch);
  inp.addEventListener('focus', () => { if (inp.value.trim().length >= 2) performSearch(); });
  inp.addEventListener('keydown', e => {
    const items = document.querySelectorAll('.search-result-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      searchActiveIdx = Math.min(searchActiveIdx + 1, items.length - 1);
      updateSearchActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      searchActiveIdx = Math.max(searchActiveIdx - 1, 0);
      updateSearchActive(items);
    } else if (e.key === 'Enter' && searchActiveIdx >= 0 && items[searchActiveIdx]) {
      e.preventDefault();
      const el = items[searchActiveIdx];
      selectSearchResult(el.dataset.fid, el.dataset.cat);
    } else if (e.key === 'Escape') {
      closeSearch();
    }
  });
});

function updateSearchActive(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === searchActiveIdx));
  const active = items[searchActiveIdx];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

// ===== UNIT SYSTEM =====
let unitSystem = 'SI';
let unitData = null;  // {systems, conversions, labels, param_map}

function fetchUnitData() {
  fetch('/api/fluid_mechanics/unit-systems')
    .then(r => r.json())
    .then(data => {
      unitData = data;
      // Update any currently rendered formula
      if (currentFormulaId) {
        const cat = catalog[currentCat];
        const formula = cat && cat.formulas ? cat.formulas.find(f=>f.id===currentFormulaId) : null;
        if (formula) reRenderFormula(formula);
      }
    })
    .catch(() => {});
}

function setUnitSystem(sys) {
  unitSystem = sys;
  document.querySelectorAll('.unit-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.unit === sys));
  // Re-render current formula with new units
  if (currentFormulaId) {
    const cat = catalog[currentCat];
    const formula = cat && cat.formulas ? cat.formulas.find(f=>f.id===currentFormulaId) : null;
    if (formula) reRenderFormula(formula);
  }
  // Store preference
  try { localStorage.setItem('fm_unitSystem', sys); } catch(e){}
}

function getUnitForParam(paramName) {
  if (!unitData || unitSystem === 'SI') return null;
  const cat = (unitData.param_map || {})[paramName];
  if (!cat) return null;
  const sys = (unitData.systems || {})[unitSystem];
  const targetUnit = sys ? sys[cat] : null;
  if (!targetUnit) return null;
  const label = (unitData.labels || {})[targetUnit] || targetUnit;
  return { unit: targetUnit, label: label, category: cat };
}

function siToCurrent(value, paramName) {
  if (!unitData || unitSystem === 'SI') return value;
  const cat = (unitData.param_map || {})[paramName];
  if (!cat || cat === 'dimensionless') return value;
  const sys = (unitData.systems || {})[unitSystem];
  const targetUnit = sys ? sys[cat] : null;
  const siUnit = (unitData.systems || {}).SI[cat];
  if (!targetUnit || !siUnit || targetUnit === siUnit) return value;
  // Convert: SI -> target using factor = conversions[cat][targetUnit]
  const conv = (unitData.conversions || {})[cat];
  if (!conv) return value;
  return value * (conv[targetUnit] || 1.0);
}

function currentToSI(value, paramName) {
  if (!unitData || unitSystem === 'SI') return value;
  const cat = (unitData.param_map || {})[paramName];
  if (!cat || cat === 'dimensionless') return value;
  const sys = (unitData.systems || {})[unitSystem];
  const targetUnit = sys ? sys[cat] : null;
  const siUnit = (unitData.systems || {}).SI[cat];
  if (!targetUnit || !siUnit || targetUnit === siUnit) return value;
  const conv = (unitData.conversions || {})[cat];
  if (!conv) return value;
  return value / (conv[targetUnit] || 1.0);
}

function reRenderFormula(formula) {
  // Collect current input values
  const inputs = {};
  formula.inputs.forEach(key => {
    const el = document.getElementById('inp_' + key);
    inputs[key] = el ? el.value : '';
  });
  renderCalculator(formula, inputs);
  // Restore input values
  formula.inputs.forEach(key => {
    const el = document.getElementById('inp_' + key);
    if (el && inputs[key] !== undefined) el.value = inputs[key];
  });
}

// Load stored unit preference
function loadStoredPrefs() {
  try {
    const stored = localStorage.getItem('fm_unitSystem');
    if (stored && ['SI','Imperial','US'].includes(stored)) {
      unitSystem = stored;
      document.querySelectorAll('.unit-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.unit === stored));
    }
  } catch(e){}
}

// Modify original DOMContentLoaded init to also fetch unit data
// (We do this by wrapping the original init callback)
loadStoredPrefs();
